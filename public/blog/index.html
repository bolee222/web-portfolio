<script>
document.addEventListener("DOMContentLoaded", function () {
  const filters = document.querySelectorAll("[data-blog-filter]");
  const posts = document.querySelectorAll("[data-blog-category]");

  filters.forEach(function (filter) {
    filter.addEventListener("click", function () {
      const selected = filter.dataset.blogFilter;
      filters.forEach(function (item) { item.classList.remove("active"); });
      filter.classList.add("active");
      posts.forEach(function (post) {
        post.hidden = selected !== "all" && post.dataset.blogCategory !== selected;
      });
    });
  });
});
</script>
