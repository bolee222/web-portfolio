{{ define "main" }}

<section>
  <div class="container">
    <div class="row row-fix">
      <div class="single-page-title">{{.Title}}</div>
    </div>

    <!-- Tabs for Filtering -->
<ul class="nav project-filterbar publication-filterbar" id="publicationTabs" aria-label="Publication categories">
  <li class="nav-item">
    <a class="nav-link project-filter-chip active" data-type="all" href="#">All</a>
  </li>
  <li class="nav-item">
    <a class="nav-link project-filter-chip" data-type="top-ranked" href="#">Top-Ranked</a>
  </li>
  <li class="nav-item">
    <a class="nav-link project-filter-chip" data-type="international" href="#">International</a>
  </li>
  <li class="nav-item">
    <a class="nav-link project-filter-chip" data-type="domestic" href="#">Domestic</a>
  </li>
</ul>

<!-- Publication List -->
<div class="publication-layout">
<div class="row" id="publication-list">
  {{ $paginator := .Paginate .RegularPages.ByDate.Reverse }}
  {{ range $paginator.Pages }}
  <div class="container publication-item" 
       data-type="{{ .Params.type }}" data-year="{{ .Params.homeYearTag }}">
    <div class="col-12 mb-3">
      {{ .Render "publication_all_acm" }}
    </div>
  </div>
  {{ end }}
  
  <div class="col-12 mt-5">
    {{ template "_internal/pagination.html" . }}
  </div>
</div>
<aside class="publication-year-guide" aria-label="Publication years">
  <div class="publication-year-guide-title">Year</div>
  <ul id="publicationYearGuide"></ul>
</aside>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const tabs = document.querySelectorAll("#publicationTabs .nav-link");
  const publications = document.querySelectorAll(".publication-item");
  const yearGuide = document.querySelector("#publicationYearGuide");

  function updateVisibleYears() {
    const displayedYears = new Set();

    if (yearGuide) yearGuide.innerHTML = "";

    publications.forEach(pub => {
      const year = pub.getAttribute("data-year") || "";
      const isVisible = window.getComputedStyle(pub).display !== "none";
      const rowYear = pub.querySelector(".publication-year");

      if (rowYear) rowYear.textContent = "";

      if (!year.trim()) return;

      if (isVisible && !displayedYears.has(year)) {
        displayedYears.add(year);
        if (rowYear) rowYear.textContent = year;

        if (yearGuide) {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = year;
          button.addEventListener("click", function () {
            pub.scrollIntoView({ behavior: "smooth", block: "start" });
          });
          item.appendChild(button);
          yearGuide.appendChild(item);
        }
      }
    });
  }

  const categoryMapping = {
    "top-ranked": ["Conference_sci", "Journal_sci"],
    "international": ["Conference_sci", "Journal_sci", "Conference_int", "Journal_int"],
    "domestic": ["Conference_dom", "Journal_dom"]
  };

  tabs.forEach(tab => {
    tab.addEventListener("click", function(event) {
      event.preventDefault();
      const selectedType = this.getAttribute("data-type");

      // Update active tab styling
      tabs.forEach(tab => tab.classList.remove("active"));
      this.classList.add("active");

      // Show or hide publications based on selected tab
      publications.forEach(pub => {
        const pubType = pub.getAttribute("data-type");

        if (selectedType === "all" || 
            (categoryMapping[selectedType] && categoryMapping[selectedType].includes(pubType)) ||
            pubType === selectedType) {
          pub.style.display = "block";
        } else {
          pub.style.display = "none";
        }
      });

      updateVisibleYears();
    });
  });

  updateVisibleYears();
});
</script>

{{ end }}
