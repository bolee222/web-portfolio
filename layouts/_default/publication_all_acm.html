<section class="section pb-0 padding0 margin-bottom-0" id="project">
    <div class="container cv-section-padding margin-bottom-0 padding-side-0">
            <div class="row margin-bottom-0">
                <div class="col-sm-10 margin-bottom-0 padding-publication_title ">
                    
                    <div class="publication-text margin-bottom-0"><a href="{{ .Params.link_PDF | absURL }}" target="_blank"></a>{{ .Params.cite_acm  | markdownify }}</a></div>

                        <ul class="btn-link-group publication-link-buttons list-inline margin-bottom-0">
                          {{ range .Params.Links }}
                          {{ if .link }}
                          <li class="list-inline-item link-text-publications">
                            <a href="{{ .link | absURL }}" target="_blank" rel="noopener">
                              <span class="publication-link-icon" aria-hidden="true">{{ if eq .label "PDF" }}📄{{ else if eq .label "Project Page" }}🔗{{ else }}↗{{ end }}</span>
                              <span>{{ .label }}</span>
                            </a>
                        </li>
                          {{ end }}
                        {{ end }}
                        </ul>
                </div>
                <div class="col-sm-2 margin-bottom-0 publication-year-column">
                  <div class="cv-text-bold publication-year" data-year="{{ .Params.homeYearTag }}">{{ .Params.homeYearTag }}</div>
                </div>
            </div>
        </div>
</section>
