{{ define "main" }}
<article class="blog-article news-article">
  <div class="container">
    <header class="blog-article-header">
      <div class="blog-article-meta">
        <span>News</span>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
      </div>
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
    </header>
    <div class="blog-article-content content">{{ .Content }}</div>
    <a class="blog-back-link" href="{{ "news/" | relLangURL }}">← Back to News</a>
  </div>
</article>
{{ end }}
